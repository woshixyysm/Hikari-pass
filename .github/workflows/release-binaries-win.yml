name: dpc-hikari-aarch64-musl

permissions:
  contents: write

on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'

jobs:
  build:
    timeout-minutes: 300
    runs-on: windows-latest

    env:
      BUILD_TYPE: Release

    steps:
      - name: Set CORES
        run: echo "CORES=$env:NUMBER_OF_PROCESSORS" >> $env:GITHUB_ENV

      # ============================================
      # 1. Checkout Hikari-pass (只取 patch 文件)
      # ============================================
      - name: Checkout Hikari-pass Repo
        uses: actions/checkout@v6
        with:
          path: hikari-patch

      # ============================================
      # 2. Download DPC++ sycl branch
      # ============================================
      - name: Download DPC++ sycl source
        shell: pwsh
        run: |
          $url = "https://github.com/woshixyysm/dpc-/archive/refs/heads/sycl.zip"
          Write-Host "Downloading DPC++ sycl from $url"

          $zipFile = "dpc-sycl.zip"
          Invoke-WebRequest -Uri $url -OutFile $zipFile

          # 查看顶层目录名
          $topDir = & 7z l $zipFile |
            ForEach-Object { ($_ -split '\s{2,}')[-1] } |
            Where-Object { $_ -like "dpc-*\*" } |
            Select-Object -First 1 |
            ForEach-Object { ($_ -split '\\')[0] }

          Write-Host "Extracting $zipFile -> $topDir"
          7z x $zipFile -aos -snld

          # 重命名为 dpc-src 方便后续操作
          Rename-Item -Path $topDir -NewName "dpc-src"
          Remove-Item $zipFile

      # ============================================
      # 3. Merge Hikari patch into DPC++ llvm/
      # ============================================
      - name: Merge Hikari Obfuscation into DPC++
        shell: pwsh
        run: |
          $src = "hikari-patch/llvm"
          $dst = "dpc-src/llvm"

          if (Test-Path "$src/lib/Transforms/Obfuscation") {
            Copy-Item -Path "$src/lib/Transforms/Obfuscation" `
                      -Destination "$dst/lib/Transforms/" -Recurse -Force
            Write-Host "Copied lib/Transforms/Obfuscation"
          }

          if (Test-Path "$src/include/llvm/Transforms/Obfuscation") {
            Copy-Item -Path "$src/include/llvm/Transforms/Obfuscation" `
                      -Destination "$dst/include/llvm/Transforms/" -Recurse -Force
            Write-Host "Copied include/llvm/Transforms/Obfuscation"
          }

          # 合并 CMakeLists.txt：在 add_subdirectory(IPO) 附近添加 Obfuscation
          $cmakeFile = "$dst/lib/Transforms/CMakeLists.txt"
          $content = Get-Content $cmakeFile -Raw
          if ($content -notmatch "Obfuscation") {
            # 在文件末尾添加（或找合适位置）
            Add-Content -Path $cmakeFile -Value "`nadd_subdirectory(Obfuscation)"
            Write-Host "Added Obfuscation to CMakeLists.txt"
          }

          # 如果有 Passes/ 或 bugpoint/ 的修改，也需要合并
          # 注意：DPC++ 可能已经修改过这些文件，建议手动确认 diff 后再自动化
          if (Test-Path "$src/lib/Passes") {
            Write-Host "WARNING: Please manually merge lib/Passes changes. Skipping auto-merge to avoid breaking DPC++."
          }
          if (Test-Path "$src/tools/bugpoint") {
            Write-Host "WARNING: Please manually merge tools/bugpoint changes. Skipping auto-merge."
          }

      # ============================================
      # 4. 准备 musl sysroot（交叉编译需要）
      # ============================================
      - name: Download aarch64-linux-musl sysroot
        shell: pwsh
        run: |
          # 使用 musl.cc 的交叉编译工具链作为 sysroot
          $url = "https://musl.cc/aarch64-linux-musl-cross.tgz"
          Invoke-WebRequest -Uri $url -OutFile "musl-cross.tgz"
          7z x "musl-cross.tgz" -aos
          # 解压后会得到 aarch64-linux-musl-cross/ 目录
          Remove-Item "musl-cross.tgz"

      # ============================================
      # 5. Build DPC++ with Hikari for AArch64 musl
      # ============================================
      - name: Build DPC++ Hikari cross-compiler
        shell: cmd
        run: |
          call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"

          cmake -Bbuild -G Ninja ^
            -S dpc-src/llvm ^
            -DLLVM_ENABLE_RPMALLOC=OFF ^
            -DLLVM_TOOL_LLVM_SHLIB_BUILD=OFF ^
            -DLLVM_INCLUDE_TESTS=OFF ^
            -DLLVM_INCLUDE_TOOLS=ON ^
            -DLLVM_INCLUDE_EXAMPLES=OFF ^
            -DLLDB_ENABLE_PYTHON=OFF ^
            -DLLVM_ENABLE_LIBXML2=OFF ^
            -DLLVM_ENABLE_ZLIB=OFF ^
            -DCMAKE_BUILD_TYPE=%BUILD_TYPE% ^
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded ^
            -DLLVM_OBFUSCATION_LINK_INTO_TOOLS=ON ^
            -DCMAKE_INSTALL_PREFIX=install ^
            -DLLVM_TARGETS_TO_BUILD="AArch64;X86" ^
            -DLLVM_DEFAULT_TARGET_TRIPLE=aarch64-linux-musl ^
            -DLLVM_ENABLE_PROJECTS="clang;lld" ^
            -DCMAKE_C_COMPILER=clang-cl ^
            -DCMAKE_CXX_COMPILER=clang-cl ^
            -DCMAKE_CXX_FLAGS="/utf-8" ^
            -DDEFAULT_SYSROOT="%CD%\aarch64-linux-musl-cross\aarch64-linux-musl" ^
            -DLLVM_BUILD_RUNTIME=OFF ^
            -DLLVM_BUILD_TOOLS=ON

          cmake --build build --config %BUILD_TYPE% --target install -j %CORES%

      # ============================================
      # 6. Package
      # ============================================
      - name: Package cross-compiler
        if: github.event_name == 'release'
        run: |
          7z a -t7z -mmt -mf -mhc -mhcf -m0=LZMA2 -mx=3 `
            DPC_Hikari_aarch64_musl.7z `
            install/bin/clang.exe `
            install/bin/clang-cl.exe `
            install/bin/clang-cpp.exe `
            install/bin/clang++.exe `
            install/bin/lld.exe `
            install/bin/lld-link.exe `
            install/bin/llvm-ar.exe `
            install/bin/llvm-lib.exe `
            install/bin/llvm-nm.exe `
            install/bin/llvm-objdump.exe `
            install/bin/llvm-readobj.exe `
            install/bin/llvm-strip.exe `
            install/lib/clang `
            aarch64-linux-musl-cross\aarch64-linux-musl

      - name: Release
        uses: softprops/action-gh-release@v3
        if: github.event_name == 'release'
        with:
          files: DPC_Hikari_aarch64_musl.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
